<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ArcMembership Pass</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fb;
        color: #17202a;
        --ink: #17202a;
        --muted: #617181;
        --line: #dce2e9;
        --panel: #ffffff;
        --soft: #f2f6f8;
        --green: #126a58;
        --blue: #116b8c;
        --red: #a43a2b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, #edf8f3 0, rgba(237, 248, 243, 0) 260px),
          #f7f8fb;
      }

      button,
      input {
        font: inherit;
      }

      button {
        min-height: 40px;
        border: 1px solid var(--green);
        border-radius: 6px;
        padding: 0 14px;
        background: var(--green);
        color: #ffffff;
        font-weight: 720;
        cursor: pointer;
      }

      button.secondary {
        background: #ffffff;
        color: var(--green);
      }

      button.danger {
        border-color: var(--red);
        background: #fff3f0;
        color: #8b2c20;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.52;
      }

      a {
        color: var(--blue);
        font-weight: 700;
      }

      main {
        width: min(1120px, 100%);
        margin: 0 auto;
        padding: 24px;
        display: grid;
        gap: 16px;
      }

      header {
        min-height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 30px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      h2 {
        font-size: 16px;
        line-height: 1.25;
        letter-spacing: 0;
      }

      .subtle {
        color: var(--muted);
        font-size: 13px;
      }

      .top-actions,
      .actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      .pill {
        min-height: 30px;
        display: inline-flex;
        align-items: center;
        border: 1px solid #c7d8d2;
        border-radius: 999px;
        padding: 0 10px;
        background: #f8fffc;
        color: #245347;
        font-size: 12px;
        font-weight: 760;
        overflow-wrap: anywhere;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(320px, 0.92fr) minmax(420px, 1.2fr);
        gap: 16px;
        align-items: start;
      }

      .stack {
        display: grid;
        gap: 16px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 16px 34px rgba(23, 32, 42, 0.07);
      }

      .panel-head {
        min-height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--line);
        padding: 14px 16px;
      }

      .panel-body {
        padding: 16px;
        display: grid;
        gap: 14px;
      }

      .fields {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        color: #536170;
        font-size: 12px;
        font-weight: 680;
      }

      input {
        width: 100%;
        min-height: 42px;
        border: 1px solid #c9d3dc;
        border-radius: 6px;
        padding: 9px 10px;
        background: #ffffff;
        color: var(--ink);
      }

      .wide {
        grid-column: 1 / -1;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .metric {
        min-height: 76px;
        border: 1px solid #dce4eb;
        border-radius: 8px;
        background: var(--soft);
        padding: 12px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 6px;
      }

      .metric strong {
        display: block;
        overflow-wrap: anywhere;
        font-size: 14px;
      }

      #statusLine {
        min-height: 22px;
        color: #354253;
        overflow-wrap: anywhere;
      }

      @media (max-width: 820px) {
        main {
          padding: 18px;
        }

        header,
        .grid,
        .fields,
        .metrics {
          grid-template-columns: 1fr;
          display: grid;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>ArcMembership Pass</h1>
          <p class="subtle">ERC721 membership mint, renewal, and approval activity on Arc Testnet</p>
        </div>
        <div class="top-actions">
          <span id="walletAddress" class="pill">Not connected</span>
          <button id="connect" type="button">Connect MetaMask</button>
        </div>
      </header>

      <section class="metrics">
        <div class="metric">
          <span>Native USDC</span>
          <strong id="nativeBalance">-</strong>
        </div>
        <div class="metric">
          <span>Pass</span>
          <strong id="tokenHandle">-</strong>
        </div>
        <div class="metric">
          <span>Expires</span>
          <strong id="expiresAt">-</strong>
        </div>
        <div class="metric">
          <span>Approved</span>
          <strong id="approvedAddress">-</strong>
        </div>
      </section>

      <section class="grid">
        <div class="stack">
          <section class="panel">
            <div class="panel-head">
              <h2>Contract</h2>
              <button id="deployContract" class="secondary" type="button">Deploy</button>
            </div>
            <div class="panel-body">
              <label>
                ArcMembershipPass contract
                <input id="contractAddress" placeholder="Deploy or paste contract address" />
              </label>
              <div class="fields">
                <label>
                  Mint price
                  <input id="mintPrice" inputmode="decimal" />
                </label>
                <label>
                  Renew price
                  <input id="renewalPrice" inputmode="decimal" />
                </label>
                <label>
                  Initial days
                  <input id="durationDays" inputmode="numeric" />
                </label>
              </div>
              <div class="actions">
                <button id="saveContract" class="secondary" type="button">Save Contract</button>
                <button id="refresh" class="secondary" type="button" disabled>Refresh</button>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h2>Pass</h2>
              <span class="pill">ERC721</span>
            </div>
            <div class="panel-body">
              <div class="fields">
                <label>
                  Token ID
                  <input id="tokenId" inputmode="numeric" />
                </label>
                <label>
                  Renewal days
                  <input id="renewalDays" inputmode="numeric" />
                </label>
                <label class="wide">
                  Handle
                  <input id="handle" />
                </label>
              </div>
              <div class="actions">
                <button id="mintPass" type="button" disabled>Mint Pass</button>
                <button id="renewPass" type="button" disabled>Renew Pass</button>
              </div>
            </div>
          </section>
        </div>

        <div class="stack">
          <section class="panel">
            <div class="panel-head">
              <h2>NFT Approval</h2>
              <span class="pill">approve / revoke</span>
            </div>
            <div class="panel-body">
              <label>
                Spender
                <input id="spender" />
              </label>
              <div class="actions">
                <button id="approvePass" type="button" disabled>Approve</button>
                <button id="revokeApproval" class="danger" type="button" disabled>Revoke</button>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h2>Receipt</h2>
              <span id="ownerAddress" class="pill">-</span>
            </div>
            <div class="panel-body">
              <p id="statusLine"></p>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script type="module" src="./arc-membership.bundle.js"></script>
  </body>
</html>
