<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SKIPIO Transfer</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #17202a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 28px;
        display: grid;
        place-items: center;
      }

      main {
        width: min(780px, 100%);
        display: grid;
        gap: 18px;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: end;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 28px;
        line-height: 1.1;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #dce1e7;
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 14px 32px rgba(23, 32, 42, 0.08);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: #546171;
      }

      input {
        width: 100%;
        min-height: 42px;
        border: 1px solid #cbd3dc;
        border-radius: 6px;
        padding: 9px 10px;
        color: #17202a;
        background: #ffffff;
        font: inherit;
      }

      input[readonly] {
        background: #f4f7fa;
      }

      button {
        min-height: 42px;
        border: 1px solid #1e6f5c;
        border-radius: 6px;
        padding: 0 14px;
        background: #1e6f5c;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: #ffffff;
        color: #1e6f5c;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .stat {
        background: #f4f7fa;
        border: 1px solid #dce1e7;
        border-radius: 6px;
        padding: 12px;
        min-height: 76px;
      }

      .stat span {
        display: block;
        color: #5a6675;
        font-size: 12px;
        margin-bottom: 6px;
      }

      .stat strong {
        display: block;
        overflow-wrap: anywhere;
        font-size: 14px;
      }

      #status {
        min-height: 22px;
        color: #354253;
        overflow-wrap: anywhere;
      }

      #status a {
        color: #1e6f5c;
        font-weight: 700;
      }

      @media (max-width: 720px) {
        body {
          padding: 18px;
        }

        header,
        .grid,
        .stats {
          grid-template-columns: 1fr;
          display: grid;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>SKIPIO Transfer</h1>
          <p>Arc Testnet</p>
        </div>
        <button id="connect" class="secondary" type="button">Connect MetaMask</button>
      </header>

      <section class="panel">
        <div class="grid">
          <label>
            SKIPIO contract
            <input id="contract" readonly />
          </label>
          <label>
            Sender
            <input id="sender" readonly value="Not connected" />
          </label>
          <label>
            Recipient
            <input id="recipient" />
          </label>
          <label>
            Amount
            <input id="amount" inputmode="decimal" value="1" />
          </label>
        </div>
      </section>

      <section class="panel">
        <div class="stats">
          <div class="stat">
            <span>Your SKIPIO</span>
            <strong id="walletBalance">-</strong>
          </div>
          <div class="stat">
            <span>Circle Wallet SKIPIO</span>
            <strong id="circleBalance">-</strong>
          </div>
          <div class="stat">
            <span>Native USDC</span>
            <strong id="nativeBalance">-</strong>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="actions">
          <button id="send" type="button" disabled>Send SKIPIO</button>
          <button id="refresh" class="secondary" type="button" disabled>Refresh</button>
        </div>
        <p id="status"></p>
      </section>
    </main>

    <script type="module">
      import {
        BrowserProvider,
        Contract,
        formatEther,
        formatUnits,
        parseUnits,
      } from "/node_modules/ethers/dist/ethers.min.js";

      const ARC_TESTNET = {
        chainId: "0x4cef52",
        chainName: "Arc Testnet",
        nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 },
        rpcUrls: ["https://rpc.testnet.arc.network"],
        blockExplorerUrls: ["https://testnet.arcscan.app"],
      };
      const SKIPIO = "0x724038D2B4c1EbE69DC8B29cc5d591C4caA21918";
      const CIRCLE_WALLET = "0x78131700be4a8f2d16eeb0cba3498d2e717f2cd3";
      const ABI = [
        "function balanceOf(address) view returns (uint256)",
        "function decimals() view returns (uint8)",
        "function transfer(address to, uint256 amount) returns (bool)",
      ];

      const el = {
        connect: document.querySelector("#connect"),
        send: document.querySelector("#send"),
        refresh: document.querySelector("#refresh"),
        contract: document.querySelector("#contract"),
        sender: document.querySelector("#sender"),
        recipient: document.querySelector("#recipient"),
        amount: document.querySelector("#amount"),
        walletBalance: document.querySelector("#walletBalance"),
        circleBalance: document.querySelector("#circleBalance"),
        nativeBalance: document.querySelector("#nativeBalance"),
        status: document.querySelector("#status"),
      };

      const state = {
        provider: null,
        signer: null,
        address: null,
        decimals: 18,
      };

      el.contract.value = SKIPIO;
      el.recipient.value = CIRCLE_WALLET;

      function setStatus(message, link) {
        el.status.innerHTML = link
          ? `${message} <a href="${link}" target="_blank" rel="noreferrer">${link}</a>`
          : message;
      }

      async function ensureArc() {
        await window.ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: ARC_TESTNET.chainId }],
        }).catch(async (error) => {
          if (error.code !== 4902) throw error;
          await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [ARC_TESTNET],
          });
        });
      }

      async function refreshBalances() {
        if (!state.provider || !state.address) return;
        const token = new Contract(SKIPIO, ABI, state.provider);
        const [decimals, walletBalance, circleBalance, nativeBalance] = await Promise.all([
          token.decimals(),
          token.balanceOf(state.address),
          token.balanceOf(CIRCLE_WALLET),
          state.provider.getBalance(state.address),
        ]);

        state.decimals = Number(decimals);
        el.walletBalance.textContent = `${formatUnits(walletBalance, decimals)} SKIPIO`;
        el.circleBalance.textContent = `${formatUnits(circleBalance, decimals)} SKIPIO`;
        el.nativeBalance.textContent = `${formatEther(nativeBalance)} USDC`;
      }

      async function connect() {
        if (!window.ethereum) {
          setStatus("MetaMask provider not found.");
          return;
        }

        setStatus("Connecting...");
        await ensureArc();
        state.provider = new BrowserProvider(window.ethereum);
        await state.provider.send("eth_requestAccounts", []);
        state.signer = await state.provider.getSigner();
        state.address = await state.signer.getAddress();

        el.sender.value = state.address;
        el.send.disabled = false;
        el.refresh.disabled = false;
        await refreshBalances();
        setStatus("Ready.");
      }

      async function sendSkipio() {
        if (!state.signer) await connect();

        const recipient = el.recipient.value.trim();
        const amount = el.amount.value.trim();
        const token = new Contract(SKIPIO, ABI, state.signer);
        const value = parseUnits(amount, state.decimals);

        el.send.disabled = true;
        setStatus("Waiting for MetaMask signature...");

        try {
          const tx = await token.transfer(recipient, value);
          const explorerUrl = `https://testnet.arcscan.app/tx/${tx.hash}`;
          setStatus("Submitted:", explorerUrl);
          await tx.wait();
          await refreshBalances();
          setStatus("Confirmed:", explorerUrl);
        } catch (error) {
          setStatus(error?.shortMessage || error?.message || "Transfer failed.");
        } finally {
          el.send.disabled = false;
        }
      }

      el.connect.addEventListener("click", connect);
      el.refresh.addEventListener("click", refreshBalances);
      el.send.addEventListener("click", sendSkipio);
    </script>
  </body>
</html>
