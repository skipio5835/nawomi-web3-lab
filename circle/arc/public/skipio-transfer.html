<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arc Token Transfer</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #17202a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 28px;
        display: grid;
        place-items: center;
      }

      main {
        width: min(780px, 100%);
        display: grid;
        gap: 18px;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: end;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 28px;
        line-height: 1.1;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #dce1e7;
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 14px 32px rgba(23, 32, 42, 0.08);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: #546171;
      }

      input,
      select {
        width: 100%;
        min-height: 42px;
        border: 1px solid #cbd3dc;
        border-radius: 6px;
        padding: 9px 10px;
        color: #17202a;
        background: #ffffff;
        font: inherit;
      }

      input[readonly] {
        background: #f4f7fa;
      }

      button {
        min-height: 42px;
        border: 1px solid #1e6f5c;
        border-radius: 6px;
        padding: 0 14px;
        background: #1e6f5c;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: #ffffff;
        color: #1e6f5c;
      }

      button.danger {
        border-color: #9b2c2c;
        background: #9b2c2c;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .stat {
        background: #f4f7fa;
        border: 1px solid #dce1e7;
        border-radius: 6px;
        padding: 12px;
        min-height: 76px;
      }

      .stat span {
        display: block;
        color: #5a6675;
        font-size: 12px;
        margin-bottom: 6px;
      }

      .stat strong {
        display: block;
        overflow-wrap: anywhere;
        font-size: 14px;
      }

      #status {
        min-height: 22px;
        color: #354253;
        overflow-wrap: anywhere;
      }

      #status a {
        color: #1e6f5c;
        font-weight: 700;
      }

      @media (max-width: 720px) {
        body {
          padding: 18px;
        }

        header,
        .grid,
        .stats {
          grid-template-columns: 1fr;
          display: grid;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Arc Token Transfer</h1>
          <p>Arc Testnet ERC20 transfer</p>
        </div>
        <button id="connect" class="secondary" type="button">Connect MetaMask</button>
      </header>

      <section class="panel">
        <div class="grid">
          <label>
            Token preset
            <select id="tokenPreset">
              <option value="ARCP" selected>ARCP / ProofToken</option>
              <option value="SKIPIO">SKIPIO</option>
              <option value="CUSTOM">Custom ERC20</option>
            </select>
          </label>
          <label>
            Token contract
            <input id="contract" />
          </label>
          <label>
            Sender
            <input id="sender" readonly value="Not connected" />
          </label>
          <label>
            Recipient
            <input id="recipient" />
          </label>
          <label>
            Amount
            <input id="amount" inputmode="decimal" />
          </label>
          <label>
            Allowance spender
            <input id="spender" />
          </label>
          <label>
            Approve amount
            <input id="approvalAmount" inputmode="decimal" />
          </label>
          <label>
            Token symbol
            <input id="tokenSymbol" readonly value="-" />
          </label>
        </div>
      </section>

      <section class="panel">
        <div class="stats">
          <div class="stat">
            <span>Your token balance</span>
            <strong id="walletBalance">-</strong>
          </div>
          <div class="stat">
            <span>Circle Wallet token balance</span>
            <strong id="circleBalance">-</strong>
          </div>
          <div class="stat">
            <span>Native USDC</span>
            <strong id="nativeBalance">-</strong>
          </div>
          <div class="stat">
            <span>Current allowance</span>
            <strong id="allowanceBalance">-</strong>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="actions">
          <button id="send" type="button" disabled>Send Token</button>
          <button id="checkAllowance" class="secondary" type="button" disabled>Check Allowance</button>
          <button id="approveAllowance" type="button" disabled>Approve Allowance</button>
          <button id="revokeAllowance" class="danger" type="button" disabled>Revoke Allowance</button>
          <button id="refresh" class="secondary" type="button" disabled>Refresh</button>
        </div>
        <p id="status"></p>
      </section>
    </main>

    <script type="module">
      import {
        BrowserProvider,
        Contract,
        formatEther,
        formatUnits,
        parseUnits,
      } from "/node_modules/ethers/dist/ethers.min.js";

      const ARC_TESTNET = {
        chainId: "0x4cef52",
        chainName: "Arc Testnet",
        nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 },
        rpcUrls: ["https://rpc.testnet.arc.network"],
        blockExplorerUrls: ["https://testnet.arcscan.app"],
      };
      const CIRCLE_WALLET = "0x78131700be4a8f2d16eeb0cba3498d2e717f2cd3";
      const TOKENS = {
        ARCP: {
          address: "0x7A30aad0AA76bF8D2C14B9Eef035C07EEFDcdA8f",
          amount: "1",
        },
        SKIPIO: {
          address: "0x724038D2B4c1EbE69DC8B29cc5d591C4caA21918",
          amount: "1",
        },
      };
      const ABI = [
        "function allowance(address owner, address spender) view returns (uint256)",
        "function approve(address spender, uint256 amount) returns (bool)",
        "function balanceOf(address) view returns (uint256)",
        "function decimals() view returns (uint8)",
        "function name() view returns (string)",
        "function symbol() view returns (string)",
        "function transfer(address to, uint256 amount) returns (bool)",
      ];

      const el = {
        approveAllowance: document.querySelector("#approveAllowance"),
        allowanceBalance: document.querySelector("#allowanceBalance"),
        checkAllowance: document.querySelector("#checkAllowance"),
        connect: document.querySelector("#connect"),
        send: document.querySelector("#send"),
        revokeAllowance: document.querySelector("#revokeAllowance"),
        refresh: document.querySelector("#refresh"),
        tokenPreset: document.querySelector("#tokenPreset"),
        contract: document.querySelector("#contract"),
        sender: document.querySelector("#sender"),
        recipient: document.querySelector("#recipient"),
        amount: document.querySelector("#amount"),
        spender: document.querySelector("#spender"),
        approvalAmount: document.querySelector("#approvalAmount"),
        tokenSymbol: document.querySelector("#tokenSymbol"),
        walletBalance: document.querySelector("#walletBalance"),
        circleBalance: document.querySelector("#circleBalance"),
        nativeBalance: document.querySelector("#nativeBalance"),
        status: document.querySelector("#status"),
      };

      const state = {
        provider: null,
        signer: null,
        injected: null,
        address: null,
        decimals: 18,
        symbol: "TOKEN",
      };

      function applyPreset() {
        const preset = TOKENS[el.tokenPreset.value];
        if (!preset) return;
        el.contract.value = preset.address;
        el.amount.value = preset.amount;
        el.approvalAmount.value = preset.amount;
      }

      applyPreset();
      el.recipient.value = CIRCLE_WALLET;
      el.spender.value = CIRCLE_WALLET;

      function setStatus(message, link) {
        el.status.innerHTML = link
          ? `${message} <a href="${link}" target="_blank" rel="noreferrer">${link}</a>`
          : message;
      }

      function tokenContract(runner) {
        const address = el.contract.value.trim();
        if (!/^0x[a-fA-F0-9]{40}$/.test(address)) {
          throw new Error("Token contract must be a valid EVM address.");
        }
        return new Contract(address, ABI, runner);
      }

      function requireAddress(value, label) {
        if (!/^0x[a-fA-F0-9]{40}$/.test(value)) {
          throw new Error(`${label} must be a valid EVM address.`);
        }
        return value;
      }

      function injectedProvider() {
        const ethereum = window.ethereum;
        if (!ethereum) return null;
        if (Array.isArray(ethereum.providers)) {
          return ethereum.providers.find((provider) => provider.isMetaMask) || ethereum.providers[0];
        }
        return ethereum;
      }

      async function ensureArc(provider) {
        await provider.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: ARC_TESTNET.chainId }],
        }).catch(async (error) => {
          if (error.code !== 4902) throw error;
          await provider.request({
            method: "wallet_addEthereumChain",
            params: [ARC_TESTNET],
          });
        });
      }

      async function tokenMetadata(token) {
        const [decimals, symbol] = await Promise.all([
          token.decimals(),
          token.symbol().catch(() => "TOKEN"),
        ]);

        state.decimals = Number(decimals);
        state.symbol = symbol;
        el.tokenSymbol.value = symbol;
      }

      function setControlsEnabled(enabled) {
        el.send.disabled = !enabled;
        el.checkAllowance.disabled = !enabled;
        el.approveAllowance.disabled = !enabled;
        el.revokeAllowance.disabled = !enabled;
        el.refresh.disabled = !enabled;
      }

      async function refreshBalances() {
        if (!state.provider || !state.address) return;
        const token = tokenContract(state.provider);
        await tokenMetadata(token);

        const allowanceSpender = el.spender.value.trim();
        const allowancePromise = /^0x[a-fA-F0-9]{40}$/.test(allowanceSpender)
          ? token.allowance(state.address, allowanceSpender)
          : Promise.resolve(null);

        const [walletBalance, circleBalance, nativeBalance, allowance] = await Promise.all([
          token.balanceOf(state.address),
          token.balanceOf(CIRCLE_WALLET),
          state.provider.getBalance(state.address),
          allowancePromise,
        ]);

        el.walletBalance.textContent = `${formatUnits(walletBalance, state.decimals)} ${state.symbol}`;
        el.circleBalance.textContent = `${formatUnits(circleBalance, state.decimals)} ${state.symbol}`;
        el.nativeBalance.textContent = `${formatEther(nativeBalance)} USDC`;
        el.allowanceBalance.textContent = allowance === null
          ? "Enter valid spender"
          : `${formatUnits(allowance, state.decimals)} ${state.symbol}`;
      }

      async function connect() {
        const provider = injectedProvider();
        if (!provider) {
          setStatus("MetaMask provider not found.");
          return;
        }

        setStatus("Connecting...");
        await ensureArc(provider);
        state.injected = provider;
        state.provider = new BrowserProvider(provider);
        await state.provider.send("eth_requestAccounts", []);
        state.signer = await state.provider.getSigner();
        state.address = await state.signer.getAddress();

        el.sender.value = state.address;
        setControlsEnabled(true);
        await refreshBalances();
        setStatus("Ready.");
      }

      async function sendToken() {
        if (!state.signer) await connect();
        if (!state.signer) return;

        const recipient = requireAddress(el.recipient.value.trim(), "Recipient");
        const amount = el.amount.value.trim();
        const token = tokenContract(state.signer);
        await tokenMetadata(token);
        const value = parseUnits(amount, state.decimals);

        setControlsEnabled(false);
        setStatus("Waiting for MetaMask signature...");

        try {
          const tx = await token.transfer(recipient, value);
          const explorerUrl = `https://testnet.arcscan.app/tx/${tx.hash}`;
          setStatus("Submitted:", explorerUrl);
          await tx.wait();
          await refreshBalances();
          setStatus("Confirmed:", explorerUrl);
        } catch (error) {
          setStatus(error?.shortMessage || error?.message || "Transfer failed.");
        } finally {
          setControlsEnabled(true);
        }
      }

      async function writeAllowance(value, waitingMessage) {
        if (!state.signer) await connect();
        if (!state.signer) return;

        const spender = requireAddress(el.spender.value.trim(), "Spender");
        const token = tokenContract(state.signer);
        await tokenMetadata(token);

        setControlsEnabled(false);
        setStatus(waitingMessage);

        try {
          const tx = await token.approve(spender, value);
          const explorerUrl = `https://testnet.arcscan.app/tx/${tx.hash}`;
          setStatus("Submitted:", explorerUrl);
          await tx.wait();
          await refreshBalances();
          setStatus("Confirmed:", explorerUrl);
        } catch (error) {
          setStatus(error?.shortMessage || error?.message || "Allowance update failed.");
        } finally {
          setControlsEnabled(true);
        }
      }

      async function approveAllowance() {
        if (!state.signer) await connect();
        if (!state.signer) return;
        const amount = el.approvalAmount.value.trim();
        const token = tokenContract(state.signer);
        await tokenMetadata(token);
        await writeAllowance(parseUnits(amount, state.decimals), "Waiting for approve signature...");
      }

      async function revokeAllowance() {
        await writeAllowance(0n, "Waiting for revoke signature...");
      }

      async function checkAllowance() {
        setStatus("Checking allowance...");
        await refreshBalances();
        setStatus("Allowance refreshed.");
      }

      el.tokenPreset.addEventListener("change", async () => {
        applyPreset();
        if (state.provider) {
          await refreshBalances().catch((error) => setStatus(error?.message || "Refresh failed."));
        }
      });
      el.connect.addEventListener("click", connect);
      el.refresh.addEventListener("click", refreshBalances);
      el.send.addEventListener("click", sendToken);
      el.checkAllowance.addEventListener("click", () => {
        checkAllowance().catch((error) => setStatus(error?.shortMessage || error?.message || "Allowance check failed."));
      });
      el.approveAllowance.addEventListener("click", () => {
        approveAllowance().catch((error) => setStatus(error?.shortMessage || error?.message || "Approve failed."));
      });
      el.revokeAllowance.addEventListener("click", () => {
        revokeAllowance().catch((error) => setStatus(error?.shortMessage || error?.message || "Revoke failed."));
      });
    </script>
  </body>
</html>
