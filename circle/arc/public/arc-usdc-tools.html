<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arc Payment Ops</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f8f7;
        color: #17211f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      main {
        width: min(980px, 100%);
        display: grid;
        gap: 16px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 16px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        color: #52625e;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #d7dfdc;
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 14px 30px rgba(23, 33, 31, 0.07);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .grid.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: #52625e;
      }

      input,
      textarea {
        min-height: 42px;
        width: 100%;
        border: 1px solid #c8d2cf;
        border-radius: 6px;
        padding: 9px 10px;
        font: inherit;
        color: #17211f;
        background: #ffffff;
      }

      textarea {
        min-height: 104px;
        resize: vertical;
      }

      input[readonly] {
        background: #f3f6f5;
      }

      button {
        min-height: 42px;
        border: 1px solid #24706b;
        border-radius: 6px;
        padding: 0 14px;
        background: #24706b;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: #ffffff;
        color: #24706b;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .stats,
      .result {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .stat,
      .result div {
        min-height: 70px;
        border: 1px solid #d7dfdc;
        border-radius: 6px;
        background: #f3f6f5;
        padding: 12px;
      }

      .stat span,
      .result strong {
        display: block;
        margin-bottom: 6px;
        color: #60706d;
        font-size: 12px;
      }

      .stat strong,
      .result span {
        display: block;
        overflow-wrap: anywhere;
        font-size: 14px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      #status {
        min-height: 22px;
        color: #33413e;
        overflow-wrap: anywhere;
      }

      a {
        color: #24706b;
        font-weight: 700;
      }

      @media (max-width: 760px) {
        body {
          padding: 18px;
        }

        header,
        .grid,
        .grid.three,
        .stats,
        .result {
          display: grid;
          grid-template-columns: 1fr;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Arc Payment Ops</h1>
          <p>Memo receipts and aggregate payouts</p>
        </div>
        <button id="connect" class="secondary" type="button">Connect MetaMask</button>
      </header>

      <section class="panel">
        <div class="grid">
          <label>
            Sender
            <input id="sender" readonly value="Not connected" />
          </label>
          <label>
            Chain
            <input readonly value="Arc_Testnet" />
          </label>
        </div>
      </section>

      <section class="panel">
        <div class="stats">
          <div class="stat">
            <span>Native USDC</span>
            <strong id="nativeBalance">-</strong>
          </div>
          <div class="stat">
            <span>ERC-20 USDC</span>
            <strong id="usdcBalance">-</strong>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="grid">
          <label>
            Memo contract
            <input id="memoContract" readonly />
          </label>
          <label>
            Multicall3From contract
            <input id="batchContract" readonly />
          </label>
        </div>
      </section>

      <section class="panel">
        <div class="grid">
          <label>
            Receipt recipient
            <input id="memoRecipient" />
          </label>
          <label>
            ERC-20 USDC amount
            <input id="memoAmount" inputmode="decimal" />
          </label>
          <label>
            Memo reference
            <input id="memoReference" />
          </label>
          <label>
            Memo data
            <input id="memoText" />
          </label>
        </div>
      </section>

      <section class="panel">
        <label>
          Payout rows
          <textarea id="batchRows" spellcheck="false"></textarea>
        </label>
      </section>

      <section class="panel">
        <div class="actions">
          <button id="memoSend" type="button" disabled>Send Receipt</button>
          <button id="batchSend" type="button" disabled>Send Batch</button>
          <button id="refresh" class="secondary" type="button" disabled>Refresh</button>
        </div>
        <p id="status"></p>
      </section>

      <section class="panel">
        <div id="memoResult" class="result">
          <div><strong>memo tx</strong><span>-</span></div>
        </div>
      </section>

      <section class="panel">
        <div id="batchResult" class="result">
          <div><strong>batch tx</strong><span>-</span></div>
        </div>
      </section>
    </main>

    <script type="module" src="/circle/arc/public/arc-usdc-tools.bundle.js"></script>
  </body>
</html>
