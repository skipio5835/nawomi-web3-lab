<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arc USDC Tools</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fa;
        color: #18202a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      main {
        width: min(900px, 100%);
        display: grid;
        gap: 18px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 16px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 28px;
        line-height: 1.1;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #d9e0e7;
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 14px 32px rgba(24, 32, 42, 0.08);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: #586575;
      }

      input,
      textarea {
        min-height: 42px;
        width: 100%;
        border: 1px solid #c9d2dc;
        border-radius: 6px;
        padding: 9px 10px;
        font: inherit;
        color: #18202a;
        background: #ffffff;
      }

      textarea {
        min-height: 112px;
        resize: vertical;
      }

      input[readonly] {
        background: #f4f7fa;
      }

      input[type="checkbox"] {
        width: 18px;
        min-height: 18px;
      }

      .check {
        display: flex;
        min-height: 42px;
        align-items: center;
        gap: 10px;
        color: #18202a;
      }

      button {
        min-height: 42px;
        border: 1px solid #5a3b68;
        border-radius: 6px;
        padding: 0 14px;
        background: #5a3b68;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: #ffffff;
        color: #5a3b68;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .stats,
      .result {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .stat,
      .result div {
        min-height: 72px;
        border: 1px solid #d9e0e7;
        border-radius: 6px;
        background: #f4f7fa;
        padding: 12px;
      }

      .stat span,
      .result strong {
        display: block;
        margin-bottom: 6px;
        color: #5b6877;
        font-size: 12px;
      }

      .stat strong,
      .result span {
        display: block;
        overflow-wrap: anywhere;
        font-size: 14px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      #status {
        min-height: 22px;
        color: #334155;
        overflow-wrap: anywhere;
      }

      a {
        color: #5a3b68;
        font-weight: 700;
      }

      @media (max-width: 760px) {
        body {
          padding: 18px;
        }

        header,
        .grid,
        .stats,
        .result {
          display: grid;
          grid-template-columns: 1fr;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Arc USDC Tools</h1>
          <p>Memo send and batch ERC-20 transfers</p>
        </div>
        <button id="connect" class="secondary" type="button">Connect MetaMask</button>
      </header>

      <section class="panel">
        <div class="grid">
          <label>
            Sender
            <input id="sender" readonly value="Not connected" />
          </label>
          <label>
            Chain
            <input readonly value="Arc_Testnet" />
          </label>
        </div>
      </section>

      <section class="panel">
        <div class="stats">
          <div class="stat">
            <span>Native USDC</span>
            <strong id="nativeBalance">-</strong>
          </div>
          <div class="stat">
            <span>ERC-20 USDC</span>
            <strong id="usdcBalance">-</strong>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="grid">
          <label>
            Memo recipient
            <input id="memoRecipient" />
          </label>
          <label>
            Native USDC amount
            <input id="memoAmount" inputmode="decimal" />
          </label>
          <label>
            Memo text
            <input id="memoText" />
          </label>
        </div>
      </section>

      <section class="panel">
        <label>
          Batch rows
          <textarea id="batchRows" spellcheck="false"></textarea>
        </label>
        <label>
          Atomic batch
          <span class="check"><input id="tryAtomic" type="checkbox" checked /> try wallet_sendCalls first</span>
        </label>
      </section>

      <section class="panel">
        <div class="actions">
          <button id="memoSend" type="button" disabled>Send Memo</button>
          <button id="batchSend" type="button" disabled>Batch USDC</button>
          <button id="refresh" class="secondary" type="button" disabled>Refresh</button>
        </div>
        <p id="status"></p>
      </section>

      <section class="panel">
        <div id="memoResult" class="result">
          <div><strong>memo tx</strong><span>-</span></div>
        </div>
      </section>

      <section class="panel">
        <div id="batchResult" class="result">
          <div><strong>batch tx</strong><span>-</span></div>
        </div>
      </section>
    </main>

    <script type="module" src="/public/arc-usdc-tools.bundle.js"></script>
  </body>
</html>
