<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>App Kit Bridge</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fa;
        color: #18202a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      main {
        width: min(960px, 100%);
        display: grid;
        gap: 18px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 16px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 28px;
        line-height: 1.1;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #d9e0e7;
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 14px 32px rgba(24, 32, 42, 0.08);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: #586575;
      }

      input,
      select {
        min-height: 42px;
        width: 100%;
        border: 1px solid #c9d2dc;
        border-radius: 6px;
        padding: 9px 10px;
        font: inherit;
        color: #18202a;
        background: #ffffff;
      }

      input[readonly] {
        background: #f4f7fa;
      }

      input[type="checkbox"] {
        width: 18px;
        min-height: 18px;
      }

      .check {
        display: flex;
        min-height: 42px;
        align-items: center;
        gap: 10px;
        color: #18202a;
      }

      button {
        min-height: 42px;
        border: 1px solid #0f6f6d;
        border-radius: 6px;
        padding: 0 14px;
        background: #0f6f6d;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: #ffffff;
        color: #0f6f6d;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .stats,
      .result {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .stat,
      .result div {
        min-height: 72px;
        border: 1px solid #d9e0e7;
        border-radius: 6px;
        background: #f4f7fa;
        padding: 12px;
      }

      .stat span,
      .result strong {
        display: block;
        margin-bottom: 6px;
        color: #5b6877;
        font-size: 12px;
      }

      .stat strong,
      .result span {
        display: block;
        overflow-wrap: anywhere;
        font-size: 14px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      #status {
        min-height: 22px;
        color: #334155;
        overflow-wrap: anywhere;
      }

      pre {
        grid-column: 1 / -1;
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
      }

      a {
        color: #0f6f6d;
        font-weight: 700;
      }

      @media (max-width: 820px) {
        body {
          padding: 18px;
        }

        header,
        .grid,
        .stats,
        .result {
          display: grid;
          grid-template-columns: 1fr;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>App Kit Bridge</h1>
          <p>Arc Testnet to Sepolia, MetaMask signing</p>
        </div>
        <button id="connect" class="secondary" type="button">Connect MetaMask</button>
      </header>

      <section class="panel">
        <div class="grid">
          <label>
            Sender
            <input id="sender" readonly value="Not connected" />
          </label>
          <label>
            Expected account
            <input id="expectedAccount" />
          </label>
          <label>
            From
            <input readonly value="Arc_Testnet" />
          </label>
          <label>
            To
            <select id="toChain">
              <option selected>Ethereum_Sepolia</option>
              <option>Base_Sepolia</option>
            </select>
          </label>
          <label>
            Recipient
            <input id="recipient" />
          </label>
          <label>
            Amount
            <input id="amount" inputmode="decimal" />
          </label>
          <label>
            Speed
            <select id="speed">
              <option selected>FAST</option>
              <option>SLOW</option>
            </select>
          </label>
          <label>
            Forwarder
            <span class="check"><input id="useForwarder" type="checkbox" checked /> useForwarder</span>
          </label>
        </div>
      </section>

      <section class="panel">
        <div class="stats">
          <div class="stat">
            <span>Arc ERC-20 USDC</span>
            <strong id="sourceUsdc">-</strong>
          </div>
          <div class="stat">
            <span>Arc Native USDC</span>
            <strong id="sourceNative">-</strong>
          </div>
          <div class="stat">
            <span>Destination USDC</span>
            <strong id="destUsdc">-</strong>
          </div>
          <div class="stat">
            <span>Destination Chain</span>
            <strong id="destChainLabel">Ethereum_Sepolia</strong>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="actions">
          <button id="estimate" type="button" disabled>Estimate</button>
          <button id="bridge" type="button" disabled>Bridge via App Kit</button>
          <button id="refresh" class="secondary" type="button" disabled>Refresh</button>
        </div>
        <p id="status"></p>
      </section>

      <section class="panel">
        <div id="estimateBox" class="result">
          <div><strong>amount</strong><span>-</span></div>
          <div><strong>route</strong><span>-</span></div>
          <div><strong>gas</strong><span>-</span></div>
          <div><strong>fees</strong><span>-</span></div>
        </div>
      </section>

      <section class="panel">
        <div id="resultBox" class="result">
          <div><strong>state</strong><span>-</span></div>
          <div><strong>amount</strong><span>-</span></div>
          <div><strong>source</strong><span>-</span></div>
          <div><strong>destination</strong><span>-</span></div>
        </div>
      </section>
    </main>

    <script type="module" src="/public/appkit-bridge.bundle.js"></script>
  </body>
</html>
