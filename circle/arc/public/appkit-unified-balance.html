<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>App Kit Unified Balance</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fa;
        color: #18202a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      main {
        width: min(980px, 100%);
        display: grid;
        gap: 18px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 16px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 28px;
        line-height: 1.1;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #d9e0e7;
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 14px 32px rgba(24, 32, 42, 0.08);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: #586575;
      }

      input,
      select {
        min-height: 42px;
        width: 100%;
        border: 1px solid #c9d2dc;
        border-radius: 6px;
        padding: 9px 10px;
        font: inherit;
        color: #18202a;
        background: #ffffff;
      }

      input[readonly] {
        background: #f4f7fa;
      }

      input[type="checkbox"] {
        width: 18px;
        min-height: 18px;
      }

      .check {
        display: flex;
        min-height: 42px;
        align-items: center;
        gap: 10px;
        color: #18202a;
      }

      button {
        min-height: 42px;
        border: 1px solid #305d2f;
        border-radius: 6px;
        padding: 0 14px;
        background: #305d2f;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: #ffffff;
        color: #305d2f;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .stats,
      .result {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .stat,
      .result div,
      #eventLog div {
        min-height: 72px;
        border: 1px solid #d9e0e7;
        border-radius: 6px;
        background: #f4f7fa;
        padding: 12px;
      }

      .stat span,
      .result strong {
        display: block;
        margin-bottom: 6px;
        color: #5b6877;
        font-size: 12px;
      }

      .stat strong,
      .result span {
        display: block;
        overflow-wrap: anywhere;
        font-size: 14px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      #status {
        min-height: 22px;
        color: #334155;
        overflow-wrap: anywhere;
      }

      pre,
      #eventLog div {
        grid-column: 1 / -1;
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
      }

      a {
        color: #305d2f;
        font-weight: 700;
      }

      @media (max-width: 820px) {
        body {
          padding: 18px;
        }

        header,
        .grid,
        .stats,
        .result {
          display: grid;
          grid-template-columns: 1fr;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>App Kit Unified Balance</h1>
          <p>Gateway deposit, balance, and spend</p>
        </div>
        <button id="connect" class="secondary" type="button">Connect MetaMask</button>
      </header>

      <section class="panel">
        <div class="grid">
          <label>
            Sender
            <input id="sender" readonly value="Not connected" />
          </label>
          <label>
            Expected account
            <input id="expectedAccount" />
          </label>
          <label>
            Source chain
            <select id="sourceChain">
              <option selected>Arc_Testnet</option>
              <option>Ethereum_Sepolia</option>
              <option>Base_Sepolia</option>
            </select>
          </label>
          <label>
            Destination chain
            <select id="destinationChain">
              <option selected>Arc_Testnet</option>
              <option>Ethereum_Sepolia</option>
              <option>Base_Sepolia</option>
            </select>
          </label>
          <label>
            Deposit amount
            <input id="depositAmount" inputmode="decimal" />
          </label>
          <label>
            Spend amount
            <input id="spendAmount" inputmode="decimal" />
          </label>
          <label>
            Recipient
            <input id="recipient" />
          </label>
          <label>
            Allowance
            <select id="allowanceStrategy">
              <option selected>approve</option>
              <option>authorize</option>
              <option>permit</option>
            </select>
          </label>
          <label>
            Forwarder
            <span class="check"><input id="useForwarder" type="checkbox" checked /> useForwarder</span>
          </label>
        </div>
      </section>

      <section class="panel">
        <div class="stats">
          <div class="stat">
            <span>Source ERC-20 USDC</span>
            <strong id="sourceUsdc">-</strong>
          </div>
          <div class="stat">
            <span>Source native balance</span>
            <strong id="sourceNative">-</strong>
          </div>
          <div class="stat">
            <span>Destination USDC</span>
            <strong id="destinationUsdc">-</strong>
          </div>
          <div class="stat">
            <span>Unified confirmed</span>
            <strong id="unifiedConfirmed">-</strong>
          </div>
          <div class="stat">
            <span>Unified pending</span>
            <strong id="unifiedPending">-</strong>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="actions">
          <button id="deposit" type="button" disabled>Deposit</button>
          <button id="checkBalance" type="button" disabled>Check Unified Balance</button>
          <button id="estimateSpend" type="button" disabled>Estimate Spend</button>
          <button id="spend" type="button" disabled>Spend</button>
          <button id="refresh" class="secondary" type="button" disabled>Refresh</button>
        </div>
        <p id="status"></p>
      </section>

      <section class="panel">
        <div id="depositBox" class="result">
          <div><strong>deposit tx</strong><span>-</span></div>
        </div>
      </section>

      <section class="panel">
        <div id="balanceBox" class="result">
          <div><strong>balance</strong><span>-</span></div>
        </div>
      </section>

      <section class="panel">
        <div id="estimateBox" class="result">
          <div><strong>estimate</strong><span>-</span></div>
        </div>
      </section>

      <section class="panel">
        <div id="spendBox" class="result">
          <div><strong>spend tx</strong><span>-</span></div>
        </div>
      </section>

      <section class="panel">
        <div id="eventLog" class="result">
          <div><strong>events</strong><span>-</span></div>
        </div>
      </section>
    </main>

    <script type="module" src="/public/appkit-unified-balance.bundle.js?v=20260624-buffer"></script>
  </body>
</html>
