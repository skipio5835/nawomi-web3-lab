<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SKIPIO Deployer</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fb;
        color: #18202a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(760px, 100%);
        display: grid;
        gap: 18px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 32px;
        line-height: 1.1;
        font-weight: 720;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #d8dee8;
        border-radius: 8px;
        padding: 20px;
        display: grid;
        gap: 14px;
        box-shadow: 0 16px 42px rgba(26, 36, 52, 0.08);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      label {
        font-size: 12px;
        font-weight: 700;
        color: #586170;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        height: 42px;
        border: 1px solid #cad2dd;
        border-radius: 6px;
        padding: 0 12px;
        font: inherit;
        background: #fbfcfe;
        color: #18202a;
      }

      button {
        height: 44px;
        border: 0;
        border-radius: 6px;
        padding: 0 16px;
        font: inherit;
        font-weight: 700;
        color: #ffffff;
        background: #135f49;
        cursor: pointer;
      }

      button.secondary {
        color: #18202a;
        background: #e8edf3;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .status,
      pre {
        min-height: 44px;
        border: 1px solid #d8dee8;
        border-radius: 6px;
        padding: 12px;
        background: #fbfcfe;
        color: #293442;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
      }

      a {
        color: #135f49;
      }

      @media (max-width: 640px) {
        body {
          padding: 18px;
          place-items: start;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 26px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>SKIPIO</h1>
        <p>Custom ERC-20 deployment on Arc Testnet</p>
      </header>

      <section class="panel">
        <div class="grid">
          <div class="field">
            <label for="expectedAccount">Expected owner</label>
            <input id="expectedAccount" value="0x0000000000000000000000000000000000000000" />
          </div>
          <div class="field">
            <label for="initialSupply">Initial supply</label>
            <input id="initialSupply" value="20200919" />
          </div>
        </div>

        <div class="actions">
          <button id="connect">Connect</button>
          <button id="deploy" disabled>Deploy</button>
          <button id="copy" class="secondary" disabled>Copy address</button>
        </div>

        <div id="status" class="status">Ready.</div>
        <pre id="result"></pre>
      </section>
    </main>

    <script type="module">
      import {
        BrowserProvider,
        ContractFactory,
        formatUnits,
        parseUnits,
      } from "/node_modules/ethers/dist/ethers.min.js";

      const ARC_TESTNET = {
        chainId: "0x4cef52",
        chainName: "Arc Testnet",
        nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 },
        rpcUrls: ["https://rpc.testnet.arc.network"],
        blockExplorerUrls: ["https://testnet.arcscan.app"],
      };

      const state = {
        provider: null,
        signer: null,
        account: null,
        deployedAddress: "",
      };

      const els = {
        connect: document.querySelector("#connect"),
        deploy: document.querySelector("#deploy"),
        copy: document.querySelector("#copy"),
        status: document.querySelector("#status"),
        result: document.querySelector("#result"),
        expectedAccount: document.querySelector("#expectedAccount"),
        initialSupply: document.querySelector("#initialSupply"),
      };

      function setStatus(message) {
        els.status.textContent = message;
      }

      function show(value) {
        els.result.textContent = JSON.stringify(value, null, 2);
      }

      async function ensureArcTestnet() {
        const chainId = await window.ethereum.request({ method: "eth_chainId" });
        if (chainId === ARC_TESTNET.chainId) return;

        try {
          await window.ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: ARC_TESTNET.chainId }],
          });
        } catch (error) {
          if (error.code !== 4902) throw error;
          await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [ARC_TESTNET],
          });
        }
      }

      function assertExpectedAccount(account) {
        const expected = els.expectedAccount.value.trim().toLowerCase();
        if (account.toLowerCase() !== expected) {
          throw new Error(`Connected account must be ${els.expectedAccount.value.trim()}`);
        }
      }

      els.connect.addEventListener("click", async () => {
        try {
          if (!window.ethereum) throw new Error("MetaMask is not available.");
          setStatus("Connecting...");
          await ensureArcTestnet();
          const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
          const account = accounts[0];
          assertExpectedAccount(account);

          state.provider = new BrowserProvider(window.ethereum);
          state.signer = await state.provider.getSigner();
          state.account = account;
          els.deploy.disabled = false;
          setStatus(`Connected: ${account}`);
        } catch (error) {
          els.deploy.disabled = true;
          setStatus(error.message ?? String(error));
        }
      });

      els.deploy.addEventListener("click", async () => {
        try {
          els.deploy.disabled = true;
          setStatus("Loading artifact...");
          const artifact = await fetch("/public/artifacts/Skipio.json", { cache: "no-store" }).then((res) =>
            res.json(),
          );

          const supply = parseUnits(els.initialSupply.value.trim(), 18);
          setStatus("Waiting for MetaMask confirmation...");
          const factory = new ContractFactory(artifact.abi, artifact.bytecode, state.signer);
          const contract = await factory.deploy(supply);

          show({ deploymentTransaction: contract.deploymentTransaction().hash });
          setStatus("Waiting for deployment...");
          await contract.waitForDeployment();

          const address = await contract.getAddress();
          state.deployedAddress = address;
          els.copy.disabled = false;

          const [name, symbol, decimals, totalSupply, balance] = await Promise.all([
            contract.name(),
            contract.symbol(),
            contract.decimals(),
            contract.totalSupply(),
            contract.balanceOf(state.account),
          ]);

          show({
            contractAddress: address,
            explorer: `https://testnet.arcscan.app/address/${address}`,
            owner: await contract.owner(),
            name,
            symbol,
            decimals: Number(decimals),
            totalSupply: formatUnits(totalSupply, decimals),
            ownerBalance: formatUnits(balance, decimals),
          });
          setStatus("Deployed.");
        } catch (error) {
          els.deploy.disabled = false;
          setStatus(error.message ?? String(error));
        }
      });

      els.copy.addEventListener("click", async () => {
        await navigator.clipboard.writeText(state.deployedAddress);
        setStatus("Address copied.");
      });
    </script>
  </body>
</html>
